paths:
    - '**/Resources/Private/Templates/**/*.{html,fluid.html}'
    - '**/Resources/Private/Partials/**/*.{html,fluid.html}'
    - '**/Resources/Private/Layouts/**/*.{html,fluid.html}'

exclude:
    - 'vendor/**'
    - 'typo3/sysext/**'
    - 'public/typo3/**'

includeSystemExtensions: false

rules:
    fluid/parse-error: true
    fluid/nesting-depth: true
    fluid/empty-section: true
    fluid/duplicate-section: true
    dead-code/partial-all-arguments: false
    dead-code/unused-partial-argument: true
    dead-code/unused-variable: true
    dead-code/orphan-partial: true
    dead-code/orphan-layout: true
    dead-code/unused-section: true

nestingDepth:
    warn: 8
    error: 12

complexity:
    warn: 10
    error: 20

deadCode:
    entryPoints:
        - '**/Resources/Private/Templates/**'
    orphanSeverity: info
    typoScriptPaths:
        - 'Configuration/**/*.typoscript'
        - 'Configuration/**/*.ts'
    excludeOrphanPatterns:
        - '**/Resources/Extensions/**'
    excludeAnalysisPatterns:
        - '**/Resources/Extensions/**'

# Optional: detailed JSON report with per-file complexity calculations
# report:
#     path: var/fluidlint-report.json

failOn: warning
